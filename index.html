<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>宠物本本</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#E98B62">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="宠物本本">
<link rel="icon" href="cat-cover.png">
<style>
:root{--a:#E98B62;--al:#FFF0E7;--ink:#3D2C2A;--m:#9B8E89;--g:#6F9C80;--gl:#E6F2EA;--bg:#F4F1EA;--r:#D44;--rl:#FFE8E8;--b:#EAF1F4}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;color:var(--ink);background:var(--bg);min-height:100vh;-webkit-tap-highlight-color:transparent}
#app{max-width:440px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative}

/* Top Nav */
.top-nav{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(0,0,0,.04)}
.top-nav .logo{font-size:17px;font-weight:900;cursor:pointer}
.top-nav .badge-ver{font-size:10px;background:var(--al);color:var(--a);padding:3px 10px;border-radius:10px;font-weight:600;cursor:pointer}

/* Main content area */
.main-content{flex:1;padding-bottom:70px}
.screen{display:none;padding:16px}
.screen.active{display:block}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(0,0,0,.06);display:flex;padding:6px 0 8px;z-index:10}
.nav-item{flex:1;text-align:center;cursor:pointer;font-size:10px;font-weight:600;color:var(--m);transition:color .15s}
.nav-item.active{color:var(--a)}
.nav-item .ni{font-size:20px;display:block;margin-bottom:1px}

/* Cards */
.card{background:rgba(255,255,255,.78);border-radius:18px;padding:16px;margin-bottom:12px;border:1px solid rgba(0,0,0,.04);box-shadow:0 4px 16px rgba(80,60,40,.04)}
.card h3{font-size:15px;font-weight:800;margin-bottom:10px}
.card-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.03);font-size:13px}
.card-row:last-child{border-bottom:none}

/* Hero Landing */
.hero-landing{text-align:center;padding:20px 0}
.hero-landing .hero-emoji{font-size:72px;margin-bottom:16px}
.hero-landing h2{font-size:28px;font-weight:900;line-height:1.3;margin-bottom:8px}
.hero-landing .sub{font-size:15px;color:var(--m);line-height:1.6;margin-bottom:20px}
.hero-preview{background:rgba(255,255,255,.78);border-radius:18px;padding:14px;text-align:left;margin-bottom:12px;border:1px solid rgba(0,0,0,.04);box-shadow:0 4px 16px rgba(80,60,40,.04)}
.hero-preview .hp-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.hero-preview .hp-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#FFD4BA,#FFF0E8);display:flex;align-items:center;justify-content:center;font-size:20px}
.hero-preview .hp-name{font-weight:800;font-size:14px}
.hero-preview .hp-meta{font-size:10px;color:var(--m)}
.hero-preview .hp-row{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid rgba(0,0,0,.03)}
.hero-preview .hp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:6px}
.hero-preview .hp-grid div{background:#fff;border-radius:8px;padding:6px 2px;text-align:center;font-size:9px;font-weight:600}
.trust-tags{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;font-size:10px;color:var(--m);margin-top:8px}
.trust-tags span{background:rgba(255,255,255,.6);border-radius:10px;padding:4px 10px}

/* Pet Profile Card */
.profile-card{text-align:center}
.profile-card .pf-av{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#FFD4BA,#FFF0E8);display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 12px;border:3px solid #fff;box-shadow:0 4px 16px rgba(80,60,40,.08)}
.profile-card .pf-name{font-size:24px;font-weight:900;margin-bottom:4px}
.profile-card .pf-meta{font-size:13px;color:var(--m);margin-bottom:8px}
.profile-card .pf-stats{display:flex;gap:10px;justify-content:center;margin:8px 0}
.profile-card .pf-stat{background:rgba(255,255,255,.7);border-radius:12px;padding:6px 14px;font-size:12px;font-weight:600}
.profile-card .edit-link{font-size:12px;color:var(--a);cursor:pointer;text-decoration:underline;margin-top:4px}

/* Empty State */
.empty-state{text-align:center;padding:40px 20px}
.empty-state .es-emoji{font-size:64px;margin-bottom:12px}
.empty-state .es-title{font-size:18px;font-weight:800;margin-bottom:6px}
.empty-state .es-desc{font-size:13px;color:var(--m);line-height:1.6;margin-bottom:16px}

/* Reminder Card */
.reminder-card{border-left:4px solid var(--a);background:var(--al)}
.reminder-item{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:13px}
.reminder-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.reminder-dot.ok{background:var(--g)}.reminder-dot.warn{background:var(--a)}.reminder-dot.over{background:var(--r)}

/* Quick Grid */
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.quick-btn{background:#fff;border-radius:14px;padding:14px 8px;text-align:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.03);transition:transform .1s;border:1px solid rgba(0,0,0,.04)}
.quick-btn:active{transform:scale(.96)}
.quick-btn .qi{font-size:28px;display:block;margin-bottom:4px}
.quick-btn .qn{font-size:12px;font-weight:700;display:block}
.quick-btn .qd{font-size:9px;color:var(--m)}

/* Status Badge */
.badge{display:inline-block;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700}
.badge-ok{background:var(--gl);color:var(--g)}
.badge-warn{background:var(--al);color:var(--a)}
.badge-over{background:var(--rl);color:var(--r)}

/* Record Row */
.rec-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:12px;border-bottom:1px solid rgba(0,0,0,.03)}
.rec-row:last-child{border-bottom:none}
.rec-actions span{cursor:pointer;color:var(--m);margin-left:4px;font-size:14px}

/* Sub Tabs */
.sub-tabs{display:flex;gap:4px;margin-bottom:10px;background:rgba(0,0,0,.03);border-radius:12px;padding:3px}
.sub-tab{flex:1;text-align:center;padding:8px 0;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer}
.sub-tab.active{background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.06)}

/* Form */
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.form-group{flex:1;min-width:70px}
.form-group label{display:block;font-size:10px;color:var(--m);margin-bottom:2px;font-weight:600}
.form-group input,.form-group select{width:100%;padding:10px 12px;border:1.5px solid #EBE4DA;border-radius:12px;font-size:13px;background:#FFFAF7;outline:none;font-family:inherit}
.form-group input:focus,.form-group select:focus{border-color:var(--a)}
.btn{display:block;width:100%;padding:12px;border:none;border-radius:24px;font-size:14px;font-weight:700;cursor:pointer;text-align:center;font-family:inherit;transition:all .15s}
.btn-primary{background:var(--a);color:#fff;box-shadow:0 4px 16px rgba(233,139,98,.2)}
.btn-outline{background:#fff;border:1.5px solid #E8E0D5;color:var(--ink)}
.btn-sm{width:auto;display:inline-block;padding:8px 18px;font-size:12px}
.btn-green{background:var(--g);color:#fff}

/* Know Card */
.know-card{background:#F8F9FB;border-radius:12px;padding:10px 14px;margin-top:8px;font-size:10px;color:#6B7B8D;line-height:1.6;max-height:55px;overflow:hidden;transition:max-height .3s;border:1px solid #E5EAF0}
.know-card.open{max-height:400px}
.know-card .know-title{font-size:11px;font-weight:800;color:var(--ink);cursor:pointer;display:flex;justify-content:space-between}
.know-card .know-title::after{content:'展开 ▾';font-size:9px;color:var(--m)}
.know-card.open .know-title::after{content:'收起 ▴'}

/* Pricing */
.pricing-cards{display:flex;flex-direction:column;gap:8px}
.pricing-card{background:#fff;border-radius:16px;padding:16px;border:2px solid #E8E0D5;cursor:pointer;transition:all .15s}
.pricing-card.selected{border-color:var(--a);background:var(--al)}
.pricing-card .pc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pricing-card .pc-name{font-size:16px;font-weight:800}
.pricing-card .pc-price{font-size:20px;font-weight:900;color:var(--a)}
.pricing-card .pc-feats{font-size:11px;color:var(--m);line-height:1.7}

/* Trend bars */
.trend-wrap{display:flex;align-items:flex-end;gap:6px;height:80px;justify-content:center;padding:8px 0}
.trend-bar{width:28px;border-radius:6px 6px 0 0;background:var(--a);opacity:.7;position:relative;min-height:4px}
.trend-bar .tv{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--m)}
.trend-bar .td{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:7px;color:var(--m);white-space:nowrap}

/* Category bars */
.cat-bar{margin:4px 0;display:flex;align-items:center;gap:8px;font-size:11px}
.cat-bar .cb-label{width:36px;text-align:right;flex-shrink:0}
.cat-bar .cb-track{flex:1;height:14px;background:rgba(0,0,0,.04);border-radius:7px;overflow:hidden}
.cat-bar .cb-fill{height:100%;border-radius:7px}
.cat-bar .cb-val{width:50px;font-size:10px;color:var(--m)}

/* Safety footer */
.safety-footer{text-align:center;padding:20px 16px;font-size:10px;color:var(--m);line-height:1.8}
.safety-footer .sf-title{font-size:13px;font-weight:800;color:var(--ink);margin-bottom:8px}

/* Overlay */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:30;display:flex;align-items:center;justify-content:center}
.overlay .ov-card{background:#fff;border-radius:20px;padding:24px;width:90%;max-width:360px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}

/* Toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:99;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="app">

<!-- Top Nav -->
<div class="top-nav">
<div class="logo" onclick="goToScreen('home')" style="position:relative;flex:1">🐱 宠物本本<div id="topPetDropdown" class="hidden" style="position:absolute;top:100%;left:0;background:#fff;border-radius:14px;box-shadow:0 10px 40px rgba(0,0,0,.15);z-index:30;min-width:200px;padding:8px;margin-top:6px;font-size:13px;font-weight:400"></div></div>
<span id="btnReset" style="font-size:11px;color:var(--m);cursor:pointer;text-decoration:underline;margin-right:10px;display:none" onclick="resetToLanding()">回到初始</span>
<div class="badge-ver" id="topVerBadge" onclick="showPricing()">免费体验</div>
</div>

<!-- Main Content -->
<div class="main-content" id="mainContent"></div>

<!-- Bottom Nav -->
<nav class="bottom-nav" id="bottomNav">
<div class="nav-item active" data-screen="home" onclick="goToScreen('home')"><span class="ni">🏠</span>首页</div>
<div class="nav-item" data-screen="health" onclick="goToScreen('health')"><span class="ni">❤️</span>健康</div>
<div class="nav-item" data-screen="weight" onclick="goToScreen('weight')"><span class="ni">⚖️</span>体重</div>
<div class="nav-item" data-screen="spending" onclick="goToScreen('spending')"><span class="ni">💰</span>花费</div>
<div class="nav-item" data-screen="mine" onclick="goToScreen('mine')"><span class="ni">📋</span>我的</div>
</nav>

<div class="toast" id="toast"></div>
</div>

<!-- Overlays (rendered by JS) -->
<div id="overlayContainer"></div>

<input type="file" id="photoInput" accept="image/*" style="display:none" onchange="uploadPhoto(event)">

<script>
// ═══ State ═══
// Migrate old data
if(localStorage.getItem('pn_pet')&&!localStorage.getItem('pn_pets')){const op=JSON.parse(localStorage.getItem('pn_pet'));if(op){const id='pet'+Date.now();op.id=id;localStorage.setItem('pn_pets',JSON.stringify([op]));localStorage.setItem('pn_currentPet',id);['vac','dew','weight','visit','med','expense','photo'].forEach(k=>{const d=localStorage.getItem('pn_'+k);if(d)localStorage.setItem('pn_'+id+'_'+k,d)});['pet','vac','dew','weight','visit','med','expense','photo'].forEach(k=>localStorage.removeItem('pn_'+k))}}
let pets=JSON.parse(localStorage.getItem('pn_pets')||'[]');
let currentPetId=localStorage.getItem('pn_currentPet')||(pets.length?pets[0].id:null);
let planLevel=localStorage.getItem('pn_plan')||'free';
let selectedPlan='single';
let creatingNewPet=false;
let currentScreen='home';
let healthSub='vac';
let spendSub='add';
let editing=null;
let customVacInterval=null,customDewOuter=null,customDewInner=null;
const FREE_VAC=1,FREE_DEW=2;

function pk(k){return currentPetId?'pn_'+currentPetId+'_'+k:null}
function ld(k,d){const key=pk(k);return key?JSON.parse(localStorage.getItem(key)||d):JSON.parse(d)}
function sd(k,v){const key=pk(k);if(key)localStorage.setItem(key,JSON.stringify(v))}

let pet=currentPetId?pets.find(p=>p.id===currentPetId)||null:null;
let vaccines=ld('vac','[]'),deworms=ld('dew','[]'),weights=ld('weight','[]');
let visits=ld('visit','[]'),meds=ld('med','[]'),expenses=ld('expense','[]');
let petPhoto=ld('photo','null');

// ═══ Helpers ═══
function save(){if(currentPetId){sd('vac',vaccines);sd('dew',deworms);sd('weight',weights);sd('visit',visits);sd('med',meds);sd('expense',expenses);sd('photo',petPhoto);if(pet){const i=pets.findIndex(p=>p.id===currentPetId);if(i>=0)pets[i]=pet;else pets.push(pet);localStorage.setItem('pn_pets',JSON.stringify(pets))}}localStorage.setItem('pn_plan',planLevel);localStorage.setItem('pn_currentPet',currentPetId||'');renderCurrent()}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function calcAge(b){if(!b)return null;const bd=new Date(b),n=new Date();let y=n.getFullYear()-bd.getFullYear(),mo=n.getMonth()-bd.getMonth();if(mo<0){y--;mo+=12}if(n.getDate()<bd.getDate()){mo--;if(mo<0){y--;mo+=12}}return{yrs:y,mos:mo}}
function calcDays(d){if(!d)return null;return Math.ceil((new Date()-new Date(d))/86400000)}
function nextDateStr(d,days){const nd=new Date(d);nd.setDate(nd.getDate()+days);return nd.toISOString().split('T')[0]}
function daysUntil(ds){return Math.ceil((new Date(ds)-new Date())/86400000)}
function sBadge(du,wd){if(du<0)return'<span class="badge badge-over">已过期</span>';if(du<=(wd||14))return'<span class="badge badge-warn">临近</span>';return'<span class="badge badge-ok">正常</span>'}
function fmt(n){return n.toFixed(2)}
function clearEdit(){editing=null}

// ═══ Navigation ═══
function goToScreen(s){
  currentScreen=s;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.screen===s));
  document.getElementById('topVerBadge').textContent=planLevel==='complete'?'完整版':planLevel==='single'?'单宠版':'免费体验';
  renderCurrent();
  document.getElementById('mainContent').scrollTop=0;
}
function renderCurrent(){
  const mc=document.getElementById('mainContent');
  document.getElementById('btnReset').style.display=pet?'inline':'none';
  if(!pet){renderLanding(mc);return}
  switch(currentScreen){
    case'home':renderHome(mc);break;
    case'health':renderHealth(mc);break;
    case'weight':renderWeight(mc);break;
    case'spending':renderSpending(mc);break;
    case'mine':renderMine(mc);break;
    default:renderHome(mc);
  }
}

// ═══ Screen: Landing (no pet) ═══
function renderLanding(mc){
  const hasSavedPets=pets.length>0;
  mc.innerHTML=`
<div class="screen active">
${hasSavedPets?`<div style="background:#FFF0E7;border-radius:12px;padding:10px 14px;margin-bottom:12px;font-size:12px;text-align:center;color:var(--a)">📋 你有 ${pets.length} 只宠物已存档。<span style="text-decoration:underline;cursor:pointer;font-weight:700" onclick="switchPet('${pets[0].id}')">点此切回</span></div>`:''}
<div class="hero-landing">
<div class="hero-emoji">🐱</div>
<h2>别再翻聊天记录<br>找疫苗日期了</h2>
<div class="sub">给毛孩子建一个健康小账本<br>疫苗、驱虫、就诊、体重、花费<br>都放在一个地方</div>
</div>
<div class="hero-preview">
<div class="hp-top"><div class="hp-av">🐱</div><div><div class="hp-name">胖橘 · 猫 · 1岁4个月</div><div class="hp-meta">示例预览</div></div></div>
<div class="hp-row"><span>💉 下次疫苗</span><span>2026-06-01 <span class="badge badge-ok">正常</span></span></div>
<div class="hp-row"><span>🟠 下次外驱</span><span>2026-05-31 <span class="badge badge-ok">正常</span></span></div>
<div class="hp-row"><span>🟢 下次内驱</span><span>2026-05-30 <span class="badge badge-warn">临近</span></span></div>
<div class="hp-grid"><div>💉疫苗</div><div>🪱驱虫</div><div>⚖️体重</div><div>🏥就诊</div></div>
</div>
<div style="display:flex;gap:10px;">
<button class="btn btn-primary" onclick="showPetSetup()" style="flex:1">给我的宠物建档</button>
<button class="btn btn-outline" onclick="loadDemo()" style="flex:1">先看示例</button>
</div>
<div class="trust-tags"><span>数据保存在本地</span><span>不替代兽医判断</span><span>打开即用</span></div>
</div>`;
}

// ═══ Screen: Home ═══
function renderHome(mc){
  const age=calcAge(pet.birth),days=calcDays(pet.arrival),isPuppy=age&&age.yrs<1;
  let reminders=[],hasAny=false;
  if(vaccines.length){const v0=vaccines[0],count=vaccines.filter(x=>x.type!=='狂犬').length;const int=customVacInterval||(v0.type==='狂犬'?365:(isPuppy&&count<3?21:365));const next=nextDateStr(v0.date,int);const du=daysUntil(next);reminders.push({icon:'💉',label:'下次疫苗',date:next,cls:du<0?'over':du<=30?'warn':'ok',days:du});hasAny=true}
  const od=deworms.filter(d=>d.type.includes('外'));if(od.length){const next=nextDateStr(od[0].date,customDewOuter||30);const du=daysUntil(next);reminders.push({icon:'🟠',label:'下次外驱',date:next,cls:du<0?'over':du<=7?'warn':'ok',days:du});hasAny=true}
  const id2=deworms.filter(d=>!d.type.includes('外'));if(id2.length){const next=nextDateStr(id2[0].date,customDewInner||(isPuppy?30:90));const du=daysUntil(next);reminders.push({icon:'🟢',label:'下次内驱',date:next,cls:du<0?'over':du<=21?'warn':'ok',days:du});hasAny=true}
  let all=[];vaccines.forEach(v=>all.push({date:v.date,text:'💉 '+v.type,type:'vac'}));deworms.forEach(d=>all.push({date:d.date,text:'🪱 '+d.type,type:'dew'}));weights.forEach(w=>all.push({date:w.date,text:'⚖️ '+w.weight+'kg',type:'wt'}));expenses.forEach(e=>all.push({date:e.date,text:'💰 '+e.category+' ¥'+fmt(e.amount),type:'exp'}));visits.forEach(v=>all.push({date:v.date,text:'🏥 '+(v.reason||'就诊'),type:'visit'}));all.sort((a,b)=>new Date(b.date)-new Date(a.date));
  const now=new Date(),thisMonth=now.getMonth(),thisYear=now.getFullYear();
  const monthExp=expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===thisMonth&&d.getFullYear()===thisYear});
  const monthTotal=monthExp.reduce((s,e)=>s+e.amount,0);

  mc.innerHTML=`
<div class="screen active">
<div class="profile-card">
<div class="pf-av" onclick="document.getElementById('photoInput').click()">${petPhoto?'<img src='+petPhoto+' style=width:80px;height:80px;border-radius:50%;object-fit:cover>':(pet.species==='狗'?'🐶':'🐱')}</div>
<div class="pf-name">${pet.name} · ${pet.species}</div>
<div class="pf-meta">${age?age.yrs+'岁'+(age.mos>0?age.mos+'个月':''):''}${days?' · 已陪伴'+days+'天':''}</div>
<div class="pf-stats">${age?`<div class="pf-stat">🐱 ${age.yrs}岁${age.mos}个月</div>`:''}${days?`<div class="pf-stat">💛 已陪伴${days}天</div>`:''}</div>

  mc.innerHTML=`

${sum.length?`<div class="card" style="text-align:center">${sum.map(s=>'<div style="font-size:13px;padding:3px 0">'+s+'</div>').join('')}</div>`:''}

function addNewPet(){creatingNewPet=true;showPetSetup()}

function delVac(i){vaccines.splice(i,1);clearEdit();save()}

// ═══ Deworm ═══
function showDewForm(type){document.getElementById('overlayContainer').innerHTML=`<div class="overlay" id="dewFormOv"><div class="ov-card"><h3>🪱 ${type}</h3><div class="form-row"><div class="form-group"><label>类型</label><select id="dwType"><option>外驱（每月）</option><option>内驱（每3月）</option></select></div><div class="form-group"><label>日期</label><input type="date" id="dwDate"></div></div><div class="form-row"><div class="form-group"><label>外驱间隔(天)</label><input type="number" id="dewOuterInt" placeholder="30" onchange="customDewOuter=this.value?parseInt(this.value):null"></div><div class="form-group"><label>内驱间隔(天)</label><input type="number" id="dewInnerInt" placeholder="幼30/成90" onchange="customDewInner=this.value?parseInt(this.value):null"></div></div><div style="display:flex;gap:8px"><button class="btn btn-primary btn-sm" onclick="addDeworm()" style="flex:1">保存</button><button class="btn btn-outline btn-sm" onclick="document.getElementById('dewFormOv').remove()" style="flex:1">取消</button></div></div></div>`;document.getElementById('dwType').value=type;clearEdit()}
function addDeworm(){if(!pet)return toast('请先建档');const dw={type:document.getElementById('dwType').value,date:document.getElementById('dwDate').value};if(!dw.date)return toast('请选择日期');const wasEdit=editing&&editing.section==='dew';if(wasEdit){deworms[editing.index]=dw;clearEdit()}else{if(planLevel==='free'&&deworms.length>=FREE_DEW)return showPricing();deworms.push(dw)}deworms.sort((a,b)=>new Date(b.date)-new Date(a.date));save();document.getElementById('dewFormOv').remove();toast(wasEdit?'🪱 已修改':'🪱 已添加')}
function editDew(i){const dw=deworms[i];editing={section:'dew',index:i};showDewForm(dw.type);setTimeout(()=>{document.getElementById('dwDate').value=dw.date},100);toast('📝 修改后点保存')}
function delDew(i){deworms.splice(i,1);clearEdit();save()}

// ═══ Weight ═══
function showWeightForm(){const wf=document.getElementById('wtForm');if(wf)wf.classList.toggle('hidden');clearEdit()}
function addWeight(){if(!pet)return toast('请先建档');if(planLevel==='free')return showPricing();const w=parseFloat(document.getElementById('wWeight').value);if(!w||w<=0)return toast('请输入有效体重');const d=document.getElementById('wDate').value;if(!d)return toast('请选择日期');const wasEdit=editing&&editing.section==='wt';if(wasEdit){weights[editing.index]={date:d,weight:w};clearEdit()}else weights.push({date:d,weight:w});weights.sort((a,b)=>new Date(b.date)-new Date(a.date));save();document.getElementById('wDate').value='';document.getElementById('wWeight').value='';toast(wasEdit?'⚖️ 已修改':'⚖️ 已记录')}
function editWeight(i){const w=weights[i];document.getElementById('wDate').value=w.date;document.getElementById('wWeight').value=w.weight;const wf=document.getElementById('wtForm');if(wf)wf.classList.remove('hidden');editing={section:'wt',index:i};goToScreen('weight');setTimeout(()=>{const wf2=document.getElementById('wtForm');if(wf2)wf2.classList.remove('hidden')},100)}
function delWeight(i){weights.splice(i,1);clearEdit();save()}

// ═══ Expense ═══
function addExpense(){if(!pet)return toast('请先建档');if(planLevel!=='complete')return showPricing();const amt=parseFloat(document.getElementById('eAmount').value);if(!amt||amt<=0)return toast('请输入有效金额');const e={date:document.getElementById('eDate').value,category:document.getElementById('eCategory').value,item:document.getElementById('eItem').value,amount:amt};if(!e.date)return toast('请选择日期');const wasEdit=editing&&editing.section==='exp';if(wasEdit){expenses[editing.index]=e;clearEdit()}else expenses.push(e);expenses.sort((a,b)=>new Date(b.date)-new Date(a.date));save();document.getElementById('eDate').value='';document.getElementById('eItem').value='';document.getElementById('eAmount').value='';toast(wasEdit?'💰 已修改':'💰 已记录')}
function editExpense(i){const e=expenses[i];editing={section:'exp',index:i};spendSub='add';goToScreen('spending');setTimeout(()=>{document.getElementById('eDate').value=e.date;document.getElementById('eCategory').value=e.category;document.getElementById('eItem').value=e.item||'';document.getElementById('eAmount').value=e.amount},100)}
function delExpense(i){expenses.splice(i,1);clearEdit();save()}

// ═══ Visit/Med Quick ═══
function showQuickForm(type){const id=type==='visit'?'vi':'m';const title=type==='visit'?'🏥 就诊记录':'💊 用药记录';const html=type==='visit'?`<div class="form-row"><div class="form-group"><label>日期</label><input type="date" id="viDate"></div><div class="form-group"><label>医院</label><input type="text" id="viHospital" placeholder="宠物医院"></div></div><div class="form-row"><div class="form-group"><label>原因</label><input type="text" id="viReason" placeholder="如 体检"></div><div class="form-group"><label>费用(¥)</label><input type="number" id="viCost" step="0.01" placeholder="0.00"></div></div><div class="form-row"><div class="form-group"><label>诊断/方案</label><input type="text" id="viDiagnosis" placeholder="医生诊断"></div></div>`:`<div class="form-row"><div class="form-group"><label>药品名</label><input type="text" id="mName" placeholder="如 海乐妙"></div><div class="form-group"><label>用法用量</label><input type="text" id="mDosage" placeholder="如 半片/次"></div></div><div class="form-row"><div class="form-group"><label>开始日期</label><input type="date" id="mStart"></div><div class="form-group"><label>结束日期</label><input type="date" id="mEnd"></div></div>`;document.getElementById('overlayContainer').innerHTML=`<div class="overlay" id="quickFormOv"><div class="ov-card"><h3>${title}</h3>${html}<div style="display:flex;gap:8px"><button class="btn btn-primary btn-sm" onclick="${type==='visit'?'addVisit':'addMed'}();document.getElementById('quickFormOv').remove()" style="flex:1">保存</button><button class="btn btn-outline btn-sm" onclick="document.getElementById('quickFormOv').remove()" style="flex:1">取消</button></div></div></div>`}
function addVisit(){if(!pet)return toast('请先建档');if(planLevel==='free')return showPricing();const v={date:document.getElementById('viDate').value,hospital:document.getElementById('viHospital').value,reason:document.getElementById('viReason').value,diagnosis:document.getElementById('viDiagnosis').value,cost:parseFloat(document.getElementById('viCost').value)||0};if(!v.date)return toast('请选择日期');visits.push(v);visits.sort((a,b)=>new Date(b.date)-new Date(a.date));save();toast('🏥 已记录')}
function addMed(){if(!pet)return toast('请先建档');if(planLevel==='free')return showPricing();const m={name:document.getElementById('mName').value,dosage:document.getElementById('mDosage').value,start:document.getElementById('mStart').value,end:document.getElementById('mEnd').value};if(!m.name)return toast('请填写药品名');meds.push(m);meds.sort((a,b)=>new Date(b.start||0)-new Date(a.start||0));save();toast('💊 已记录')}

// ═══ Pricing ═══
function showPricing(){document.getElementById('overlayContainer').innerHTML=`<div class="overlay" id="pricingOv"><div class="ov-card"><h3>先免费试，再决定要不要解锁</h3><div class="pricing-cards"><div class="pricing-card" onclick="selectPricingCard(this,'free')"><div class="pc-head"><span class="pc-name">🆓 免费体验版</span><span class="pc-price">¥0</span></div><div class="pc-feats">基础记录体验 · 本地保存 · 可先感受流程</div></div><div class="pricing-card" onclick="selectPricingCard(this,'single')"><div class="pc-head"><span class="pc-name">⭐ 单宠版 <span style="font-size:10px;color:var(--g)">推荐入门</span></span><span class="pc-price">¥9.9</span></div><div class="pc-feats">适合1只猫狗 · 无限记录 · 疫苗/驱虫 · 体重趋势 · 就诊与用药记录</div></div><div class="pricing-card" onclick="selectPricingCard(this,'complete')"><div class="pc-head"><span class="pc-name">👑 完整版 <span style="font-size:10px;color:var(--a)">更划算</span></span><span class="pc-price">¥19.9</span></div><div class="pc-feats">单宠版全部功能 · 多宠管理 · 花费统计 · 后续更新可用</div></div></div><div class="form-row" style="margin-top:10px"><div class="form-group"><label>专属访问码</label><input type="text" id="accessCode" placeholder="下单后获取"></div></div><div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-primary btn-sm" onclick="doUnlock()" style="flex:1">解锁 🔓</button><button class="btn btn-outline btn-sm" onclick="document.getElementById('pricingOv').remove()" style="flex:1">关闭</button></div><div style="font-size:10px;color:var(--m);text-align:center;margin-top:8px">一次解锁，长期可用。数据保存在你的设备本地。</div></div></div>`;selectPricingCard(document.querySelector('#pricingOv .pricing-card:nth-child(2)'),'single')}
function selectPricingCard(el,plan){selectedPlan=plan;document.querySelectorAll('.pricing-card').forEach(c=>c.classList.remove('selected'));el.classList.add('selected')}
function doUnlock(){const code=document.getElementById('accessCode').value.trim().toUpperCase();if(!selectedPlan||!code)return toast('请选择方案并输入访问码');function h(s){let h1=2166136261,h2=5381;for(let i=0;i<s.length;i++){h1^=s.charCodeAt(i);h1=Math.imul(h1,16777619);h2=((h2<<5)+h2)+s.charCodeAt(i)}return(h1>>>0).toString(16).padStart(8,'0')+(h2>>>0).toString(16).padStart(8,'0')}const S=['071021e0f856a046','b48c30983602c658','b09c871f62e87881','4e2af807adf917d9','18743161ba99e8bf','18f58cadf7bb4385','9ad0563845724b08','c96cbfc6edf043c0','341e33e32f4313d3','fbdbad6ce2e8ca42'];const C=['429ce966631ccc50','010fd5fc5de5a190','8420a8f4a7c598f0','b1fde12c9243047c','c9cb22fb634c3e7f','710cd64383a00615','c431d88f01caafcb','0c8905fe6af64262'];const list=selectedPlan==='complete'?C:S;if(list.includes(h(code))){planLevel=selectedPlan;localStorage.setItem('pn_plan',planLevel);document.getElementById('pricingOv').remove();goToScreen('home');toast('🎉 已解锁！')}else toast('❌ 访问码无效')}

// ═══ Save Card ═══
function saveCard(){if(planLevel==='free')return showPricing();const n=pet?pet.name:'宠物',now=new Date().toISOString().split('T')[0];const age=calcAge(pet?pet.birth:null);const days=calcDays(pet?pet.arrival:null);let h='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+n+' 健康卡</title><style>body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;max-width:600px;margin:0 auto;padding:20px;color:#3D2C2A}h2{color:#E98B62;border-bottom:2px solid #FFF0E7;padding-bottom:6px;margin-top:20px}table{width:100%;border-collapse:collapse;margin:8px 0}th{background:#FFF0E7;padding:6px;text-align:left;font-size:13px}td{padding:5px 6px;border-bottom:1px solid #F5EDE8;font-size:12px}.info{color:#9B8E89;font-size:13px;margin:4px 0}</style></head><body><h1>'+n+' 健康卡</h1>';if(pet)h+='<p class="info">'+pet.species+(age?' · '+age.yrs+'岁'+(age.mos>0?age.mos+'个月':''):'')+(days?' · 已陪伴'+days+'天':'')+'</p>';h+='<p class="info">生成于 '+now+' · @宠物本本杂货铺</p>';if(vaccines.length)h+='<h2>💉 疫苗记录 ('+vaccines.length+'条)</h2><table><tr><th>日期</th><th>类型</th><th>医院</th><th>凭证</th></tr>'+vaccines.map(v=>'<tr><td>'+v.date+'</td><td>'+v.type+'</td><td>'+(v.hospital||'—')+'</td><td>'+(v.proof||'—')+'</td></tr>').join('')+'</table>';if(deworms.length)h+='<h2>🪱 驱虫记录 ('+deworms.length+'条)</h2><table><tr><th>日期</th><th>类型</th></tr>'+deworms.map(d=>'<tr><td>'+d.date+'</td><td>'+d.type+'</td></tr>').join('')+'</table>';if(weights.length){const last=weights[0];h+='<h2>⚖️ 体重记录 ('+weights.length+'条) · 最新 '+last.weight+'kg</h2><table><tr><th>日期</th><th>体重</th></tr>'+weights.map(w=>'<tr><td>'+w.date+'</td><td>'+w.weight+'kg</td></tr>').join('')+'</table>'}if(visits.length)h+='<h2>🏥 就诊记录 ('+visits.length+'条)</h2><table><tr><th>日期</th><th>医院</th><th>原因</th><th>诊断</th><th>费用</th></tr>'+visits.map(v=>'<tr><td>'+v.date+'</td><td>'+(v.hospital||'—')+'</td><td>'+(v.reason||'—')+'</td><td>'+(v.diagnosis||'—')+'</td><td>'+(v.cost?'¥'+v.cost:'—')+'</td></tr>').join('')+'</table>';if(meds.length)h+='<h2>💊 用药记录 ('+meds.length+'条)</h2><table><tr><th>药品</th><th>用法</th><th>开始</th><th>结束</th></tr>'+meds.map(m=>'<tr><td>'+m.name+'</td><td>'+(m.dosage||'—')+'</td><td>'+(m.start||'—')+'</td><td>'+(m.end||'—')+'</td></tr>').join('')+'</table>';h+='<p style="text-align:center;color:#9B8E89;font-size:10px;margin-top:24px">健康内容仅做记录参考，不替代兽医判断<br>数据保存在浏览器本地 · @宠物本本杂货铺</p></body></html>';const blob=new Blob([h],{type:'text/html'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=n+'_健康卡_'+now+'.html';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);toast('💾 已保存')}

// ═══ Demo ═══

goToScreen('home');
